services:
  postgres:
    image: postgres:16-alpine
    container_name: offirst-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: offirst
      POSTGRES_PASSWORD: offirst
      POSTGRES_DB: offirst
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U offirst -d offirst']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: offirst-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: offirst
      MINIO_ROOT_PASSWORD: offirst123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 offirst offirst123;
      mc mb --ignore-existing local/offirst;
      mc anonymous set download local/offirst;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
